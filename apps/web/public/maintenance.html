<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | TraderPath</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .wrap{
      width: min(400px, 100%);
      text-align: center;
    }

    /* Logo */
    .logo{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 48px;
    }
    .logo img{ height: 28px; width: auto; }
    .logo span{
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #40E0D0, #FF5A5A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Status dot */
    .dot-wrap{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .dot{
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #40E0D0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ opacity: 1; }
      50%{ opacity: .3; }
    }
    .dot-label{
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #4A4A4A;
    }

    /* Heading */
    h1{
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .sub{
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Divider */
    .line{
      width: 32px;
      height: 1px;
      background: rgba(64, 224, 208, .3);
      margin: 28px auto;
    }

    /* Footer */
    .foot{
      color: #333;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="/logo.svg" alt="TraderPath" />
      <span>TraderPath</span>
    </div>

    <div class="dot-wrap">
      <div class="dot"></div>
      <span class="dot-label">Upgrading</span>
    </div>

    <h1>Back shortly.</h1>
    <p class="sub">Systems are being upgraded. Your data is safe.</p>

    <div class="line"></div>

    <div class="foot">&copy; 2026 TraderPath</div>
  </div>
</body>
</html>
