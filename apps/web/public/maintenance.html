<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | TraderPath</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    :root{
      --coal:#000000;
      --coal2:#0A0A0A;
      --text:#FFFFFF;
      --muted:#8B8B8B;
      --muted2:#4A4A4A;
      --teal:#40E0D0;
      --teal10: rgba(64,224,208,.10);
      --teal25: rgba(64,224,208,.25);
      --border: rgba(255,255,255,.08);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--coal);
      color: var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 28px;
    }

    .wrap{ width:min(880px,100%); }
    
    .top{
      display:flex; align-items:center; justify-content:flex-start;
      margin-bottom: 24px;
    }
    
    /* Logo Alanı */
    .logo-img {
      height: 32px;
      width: auto;
      display: block;
    }

    .card{
      position:relative;
      background: var(--coal2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      top: 14px; left: 14px;
      width: 3px; height: 58px;
      border-radius: 3px;
      background: var(--teal);
    }

    .grid{
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: .22;
      pointer-events:none;
      mask-image: radial-gradient(ellipse at 35% 15%, rgba(0,0,0,.95) 0%, rgba(0,0,0,.35) 55%, rgba(0,0,0,0) 78%);
    }

    .inner{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      align-items:stretch;
    }

    .left{ padding: 34px 28px 28px 28px; }
    .right{
      border-left: 1px solid rgba(255,255,255,.06);
      display:flex; align-items:center; justify-content:center;
      padding: 26px;
    }

    .label{
      font-size: 10px; font-weight: 800;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 12px;
    }

    h1{
      font-size: clamp(36px, 5.2vw, 56px);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .sub{
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 62ch;
    }

    .meta{
      display:flex; gap: 10px; flex-wrap: wrap; margin-top: 22px;
    }

    .chip{
      border: 1px solid var(--teal25);
      background: var(--teal10);
      color: var(--teal);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .chip.secondary{
      border-color: rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      color: var(--muted);
    }

    .dir{
      display:flex; align-items:center; gap: 10px; margin-top: 18px;
    }
    .tri{
      width:0; height:0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 12px solid var(--teal);
    }
    .dir span{
      font-size: 11px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted); font-weight: 800;
    }

    .footer{
      margin-top: 14px;
      color: var(--muted2);
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    @media (max-width: 820px){
      .inner{ grid-template-columns: 1fr; }
      .right{ border-left: none; border-top: 1px solid rgba(255,255,255,.06); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <!-- Logonuzun yolu /logo.svg ise bu şekilde çalışır -->
      <img src="/logo.svg" alt="TraderPath Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="brand-name" style="display:none; font-size: 11px; font-weight: 800; letter-spacing: .32em; text-transform: uppercase; color: var(--teal);">TraderPath</div>
    </div>

    <section class="card">
      <div class="grid"></div>
      <div class="inner">
        <div class="left">
          <div class="label">System Status</div>
          <h1>Maintenance Mode</h1>
          <p class="sub">
            We're upgrading core infrastructure to improve stability and reduce latency across capital-flow analytics
            and AI predictions.
          </p>

          <div class="dir">
            <div class="tri"></div>
            <span>In Progress · Core systems upgrading</span>
          </div>

          <div class="meta">
            <div class="chip">ETA: ~2 Hours</div>
            <div class="chip secondary">No data loss</div>
          </div>
        </div>

        <div class="right">
          <svg viewBox="0 0 420 260" width="100%" height="220" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="418" height="258" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
            <path d="M60 190 L150 190 L220 105 L330 105" fill="none" stroke="#40E0D0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="60" cy="190" r="7" fill="#40E0D0" opacity="0.9"/>
            <circle cx="330" cy="105" r="9" fill="#40E0D0" opacity="0.95"/>
            <text x="28" y="38" font-family="Inter, sans-serif" font-size="10" font-weight="800" letter-spacing="0.18em" fill="rgba(255,255,255,0.35)">UPGRADING</text>
            <rect x="18" y="170" width="384" height="2" fill="rgba(64,224,208,0.18)"/>
          </svg>
        </div>
      </div>
    </section>

    <div class="footer">
      © 2026 TraderPath
    </div>
  </div>
</body>
</html>
