    <rect x="496" y="0" width="200" height="80" rx="10" fill="#00F5A0" opacity="0.08" stroke="#00F5A0" stroke-opacity="0.2"/>
    <circle cx="520" cy="20" r="12" fill="#00F5A0" opacity="0.25"/>
    <text x="520" y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="white" opacity="0.6">3</text>
    <rect x="540" y="14" width="80" height="8" rx="4" fill="#00F5A0" opacity="0.3"/>
    <rect x="512" y="44" width="168" height="4" rx="2" fill="#00F5A0" opacity="0.1"/>
    <rect x="512" y="56" width="140" height="4" rx="2" fill="#00F5A0" opacity="0.1"/>
