<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1421"/>
      <stop offset="100%" stop-color="#1F160D"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#fb923c">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="213" y1="0" x2="213" y2="720"/>
    <line x1="426" y1="0" x2="426" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="853" y1="0" x2="853" y2="720"/>
    <line x1="1066" y1="0" x2="1066" y2="720"/>
  </g>
  <!-- Chart area -->
  <rect x="60" y="40" width="880" height="520" rx="16" fill="#1a2332" stroke="#fb923c" stroke-opacity="0.1"/>
  <!-- Candlesticks -->
  <g transform="translate(100,100)">
    <!-- Green candles -->
    <line x1="30" y1="80" x2="30" y2="320" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="22" y="140" width="16" height="120" rx="2" fill="#00F5A0" opacity="0.6"/>
    <line x1="80" y1="100" x2="80" y2="300" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="72" y="120" width="16" height="100" rx="2" fill="#00F5A0" opacity="0.6"/>
    <line x1="180" y1="60" x2="180" y2="280" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="172" y="100" width="16" height="120" rx="2" fill="#00F5A0" opacity="0.6"/>
    <line x1="280" y1="40" x2="280" y2="240" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="272" y="80" width="16" height="100" rx="2" fill="#00F5A0" opacity="0.6"/>
    <line x1="380" y1="20" x2="380" y2="200" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="372" y="40" width="16" height="120" rx="2" fill="#00F5A0" opacity="0.6"/>
    <line x1="480" y1="50" x2="480" y2="220" stroke="#00F5A0" stroke-width="1" opacity="0.5"/>
    <rect x="472" y="80" width="16" height="80" rx="2" fill="#00F5A0" opacity="0.6"/>
    <!-- Red candles -->
    <line x1="130" y1="120" x2="130" y2="340" stroke="#FF4757" stroke-width="1" opacity="0.5"/>
    <rect x="122" y="160" width="16" height="120" rx="2" fill="#FF4757" opacity="0.6"/>
    <line x1="230" y1="80" x2="230" y2="300" stroke="#FF4757" stroke-width="1" opacity="0.5"/>
    <rect x="222" y="120" width="16" height="100" rx="2" fill="#FF4757" opacity="0.6"/>
    <line x1="330" y1="60" x2="330" y2="260" stroke="#FF4757" stroke-width="1" opacity="0.5"/>
    <rect x="322" y="100" width="16" height="80" rx="2" fill="#FF4757" opacity="0.6"/>
    <line x1="430" y1="30" x2="430" y2="240" stroke="#FF4757" stroke-width="1" opacity="0.5"/>
    <rect x="422" y="60" width="16" height="100" rx="2" fill="#FF4757" opacity="0.6"/>
    <!-- Forecast zone -->
    <rect x="520" y="0" width="280" height="380" rx="0" fill="#fb923c" opacity="0.03"/>
    <line x1="520" y1="0" x2="520" y2="380" stroke="#fb923c" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
    <text x="600" y="20" font-family="Inter,sans-serif" font-size="10" fill="#fb923c" opacity="0.4">FORECAST</text>
    <!-- Forecast line -->
    <polyline points="520,100 570,90 620,80 670,60 720,50 770,30" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.5" stroke-dasharray="4,3"/>
    <!-- Confidence band -->
    <polygon points="520,100 570,80 620,65 670,40 720,25 770,5 770,55 720,75 670,80 620,95 570,100 520,100" fill="#fb923c" opacity="0.06"/>
  </g>
  <!-- Entry/SL/TP lines -->
  <line x1="100" y1="220" x2="900" y2="220" stroke="#00D4FF" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <rect x="900" y="212" width="60" height="16" rx="4" fill="#00D4FF" opacity="0.2"/>
  <text x="930" y="224" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#00D4FF" opacity="0.7">ENTRY</text>
  <line x1="100" y1="440" x2="900" y2="440" stroke="#FF4757" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <rect x="900" y="432" width="40" height="16" rx="4" fill="#FF4757" opacity="0.2"/>
  <text x="920" y="444" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#FF4757" opacity="0.7">SL</text>
  <line x1="100" y1="120" x2="900" y2="120" stroke="#00F5A0" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <rect x="900" y="112" width="40" height="16" rx="4" fill="#00F5A0" opacity="0.2"/>
  <text x="920" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#00F5A0" opacity="0.7">TP</text>
  <!-- Right panel - Trade plan -->
  <rect x="960" y="40" width="280" height="520" rx="16" fill="#1a2332" stroke="#fb923c" stroke-opacity="0.12"/>
  <rect x="984" y="64" width="100" height="10" rx="5" fill="#fb923c" opacity="0.35"/>
  <rect x="984" y="88" width="160" height="8" rx="4" fill="#fb923c" opacity="0.12"/>
  <!-- Trade level cards -->
  <rect x="984" y="116" width="232" height="60" rx="8" fill="#00D4FF" opacity="0.06" stroke="#00D4FF" stroke-opacity="0.15"/>
  <rect x="1000" y="128" width="40" height="8" rx="4" fill="#00D4FF" opacity="0.3"/>
  <rect x="1000" y="144" width="100" height="16" rx="4" fill="#00D4FF" opacity="0.12"/>
  <rect x="984" y="188" width="232" height="60" rx="8" fill="#00F5A0" opacity="0.06" stroke="#00F5A0" stroke-opacity="0.15"/>
  <rect x="1000" y="200" width="40" height="8" rx="4" fill="#00F5A0" opacity="0.3"/>
  <rect x="1000" y="216" width="100" height="16" rx="4" fill="#00F5A0" opacity="0.12"/>
  <rect x="984" y="260" width="232" height="60" rx="8" fill="#FF4757" opacity="0.06" stroke="#FF4757" stroke-opacity="0.15"/>
  <rect x="1000" y="272" width="40" height="8" rx="4" fill="#FF4757" opacity="0.3"/>
  <rect x="1000" y="288" width="100" height="16" rx="4" fill="#FF4757" opacity="0.12"/>
  <!-- Risk metrics -->
  <rect x="984" y="340" width="232" height="4" rx="2" fill="#fb923c" opacity="0.1"/>
  <rect x="984" y="360" width="110" height="44" rx="8" fill="#fb923c" opacity="0.06"/>
  <rect x="1106" y="360" width="110" height="44" rx="8" fill="#fb923c" opacity="0.06"/>
  <rect x="984" y="416" width="110" height="44" rx="8" fill="#fb923c" opacity="0.06"/>
  <rect x="1106" y="416" width="110" height="44" rx="8" fill="#fb923c" opacity="0.06"/>
  <!-- Confidence bar -->
  <rect x="984" y="480" width="232" height="24" rx="6" fill="#fb923c" opacity="0.08"/>
  <rect x="984" y="480" width="160" height="24" rx="6" fill="#fb923c" opacity="0.2"/>
  <!-- Bottom bar -->
  <rect x="60" y="580" width="1180" height="100" rx="16" fill="#1a2332" stroke="#fb923c" stroke-opacity="0.08"/>
  <rect x="84" y="604" width="80" height="8" rx="4" fill="#fb923c" opacity="0.3"/>
  <rect x="84" y="624" width="200" height="32" rx="6" fill="#fb923c" opacity="0.06"/>
  <rect x="300" y="624" width="200" height="32" rx="6" fill="#fb923c" opacity="0.06"/>
  <rect x="516" y="624" width="200" height="32" rx="6" fill="#fb923c" opacity="0.06"/>
  <!-- Glow -->
  <circle cx="500" cy="300" r="200" fill="#fb923c" opacity="0.015"/>
  <text x="640" y="700" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#fb923c" opacity="0.4" letter-spacing="3">CHART + TRADE PLAN</text>
</svg>
