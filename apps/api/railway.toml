# NOTE: This API requires workspace packages from the monorepo root.
# Set Railway "Root Directory" to "/" (empty) to deploy from repo root.

[build]
builder = "nixpacks"
buildCommand = "pnpm exec esbuild src/**/*.ts --outdir=dist --platform=node --target=node20 --format=esm --sourcemap"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
