# ===========================================
# Railway Configuration for TFT Predictor Service
# Deployed in europe-west4 region for low latency
# ===========================================

[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"
# Increase build timeout for ML dependencies (in seconds)
# Default is 600 (10 min), we set to 1200 (20 min) for safety
buildCommand = ""

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
region = "europe-west4"

# Resource configuration for ML workloads
numReplicas = 1

# Start command (optional, uses Dockerfile CMD by default)
# startCommand = "python -m uvicorn src.api:app --host 0.0.0.0 --port 8000"
