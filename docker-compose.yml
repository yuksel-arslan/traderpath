version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: traderpath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-traderpath}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-traderpath123}
      POSTGRES_DB: ${DB_NAME:-traderpath}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-traderpath}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traderpath-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  tft-predictor:
    build:
      context: ./services/tft-predictor
      dockerfile: Dockerfile
    container_name: traderpath-tft
    restart: unless-stopped
    ports:
      - "${TFT_PORT:-8001}:8000"
    volumes:
      - tft_models:/app/models
    environment:
      - TFT_MODEL_PATH=/app/models/tft_crypto.pt
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  tft_models:
