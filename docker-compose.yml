version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradepath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tradepath}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tradepath123}
      POSTGRES_DB: ${DB_NAME:-tradepath}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tradepath}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradepath-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
